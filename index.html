<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gagan Portfolio</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Gagan Shanku</h1>
    <button onclick="toggleDarkMode()">🌙</button>
</header>

<nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#projects">Projects</a>
    <a href="#gallery">Gallery</a>
    <a href="#contact">Contact</a>
</nav>

<section id="home" class="fade">
    <img src="assets/profile.jpg">
    <h2>I am <span id="typing"></span></h2>
</section>

<section id="about" class="fade">
    <h2>About Me</h2>
    <p>I am a passionate developer learning web technologies.</p>
</section>

<section id="projects" class="fade">
    <h2>Projects</h2>
    <div class="card">
        <img src="assets/project1.png">
        <p>My awesome project</p>
    </div>
</section>

<section id="gallery" class="fade">
    <h2>Gallery</h2>
    <img src="assets/certificate1.jpg" onclick="openModal(this)">
</section>

<section id="contact" class="fade">
    <h2>Contact</h2>
    <p>Email: your@email.com</p>
</section>

<!-- Image Popup -->
<div id="modal" onclick="closeModal()">
    <img id="modalImg">
</div>

<script src="script.js"></script>
</body>
</html>
